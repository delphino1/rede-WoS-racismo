<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rede de Co‑Citação · Raça e Racismo no Brasil (v2)</title>
  <meta name="description" content="Rede de co‑citação bibliométrica sobre raça e racismo no Brasil — Web of Science 2000–2025 (versão com filtros dinâmicos e acessibilidade)">

  <!-- Fonts & D3 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>

  <!-- ----------  ESTILO  (quase igual ao v1, acrescentei apenas itens de UI & cores em variáveis) ---------- -->
  <style>
    :root{
      /* Paleta Claro‑Escuro via CSS custom‑props */
      --bg-1:#03030a; --bg-2:#08081e; --panel-bg:rgba(7,7,18,0.97);
      --border-1:rgba(255,255,255,0.07); --txt-1:#e8e8f0; --txt-muted:rgba(255,255,255,0.35);
      --accent-1:#7b6fff; --accent-2:#40c4ff;
    }
    [data-theme='light']{
      --bg-1:#f9f9ff; --bg-2:#f1f1ff; --panel-bg:rgba(255,255,255,0.97);
      --border-1:rgba(0,0,0,0.08); --txt-1:#141414; --txt-muted:rgba(0,0,0,0.55);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;height:100%;overflow:hidden;font-family:'Space Grotesk',sans-serif;background:var(--bg-1);color:var(--txt-1)}
    #bg-canvas{position:fixed;inset:0;pointer-events:none;z-index:0}
    #app{position:relative;z-index:1;display:flex;width:100%;height:100%}
    /* Painel lateral */
    #panel{position:relative;width:300px;min-width:300px;height:100%;background:var(--panel-bg);backdrop-filter:blur(20px);border-right:1px solid var(--border-1);display:flex;flex-direction:column;transition:transform .3s cubic-bezier(.4,0,.2,1),min-width .3s;overflow:hidden}
    #panel.collapsed{transform:translateX(-300px);min-width:0}
    #panel-toggle{position:absolute;right:-28px;top:50%;transform:translateY(-50%);width:28px;height:56px;background:var(--panel-bg);border:1px solid var(--border-1);border-left:none;border-radius:0 10px 10px 0;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--txt-muted);font-size:13px;transition:all .2s;outline:none}
    #panel-toggle:hover{color:var(--txt-1);background:rgba(14,14,36,0.99)}
    #panel-toggle .arrow{display:inline-block;transition:transform .3s}
    #panel.collapsed #panel-toggle .arrow{transform:rotate(180deg)}
    .panel-inner{flex:1;overflow-y:auto;padding:24px 22px 16px;scrollbar-width:thin;scrollbar-color:var(--txt-muted) transparent}
    .panel-inner::-webkit-scrollbar{width:4px}
    .panel-inner::-webkit-scrollbar-thumb{background:var(--txt-muted);border-radius:2px}
    .eyebrow{font-family:'Space Mono',monospace;font-size:9px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--txt-muted);margin-bottom:8px}
    .panel-title{font-size:19px;font-weight:700;line-height:1.25;margin-bottom:4px}
    .panel-title em{font-style:normal;display:block;font-size:11px;font-weight:400;color:var(--txt-muted);margin-top:6px;font-family:'Space Mono',monospace}
    .search-wrap{position:relative;margin:18px 0 0}
    .search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--txt-muted);font-size:15px;pointer-events:none}
    #search-input{width:100%;padding:9px 12px 9px 34px;background:rgba(255,255,255,0.05);border:1px solid var(--border-1);border-radius:8px;color:var(--txt-1);font-size:13px;outline:none}
    #search-input::placeholder{color:var(--txt-muted)}

    /* NOVO · Slider peso mínimo */
    .weight-control{margin:22px 0 6px}
    .weight-label{font-size:10px;font-family:'Space Mono',monospace;color:var(--txt-muted);letter-spacing:.12em;text-transform:uppercase;margin-bottom:5px}
    #weight-slider{width:100%}

    /* Legend et al iguais ao v1 */
    .legend-item{display:flex;align-items:center;gap:9px;padding:7px 8px;border-radius:7px;cursor:pointer;margin-bottom:3px;transition:background .2s;font-size:11px}
    .legend-item:hover{background:rgba(255,255,255,0.05)}
    .legend-item.active{background:rgba(255,255,255,0.1)}
    .legend-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
    .legend-name{flex:1}

    /* Canvas */
    #canvas-area{flex:1;position:relative;overflow:hidden}
    #viz-svg{width:100%;height:100%;background:radial-gradient(ellipse at 58% 48%,var(--bg-2) 0%,var(--bg-1) 68%);cursor:grab;display:block}
    #viz-svg:active{cursor:grabbing}

    /* Botões fixos */
    #fixed-buttons{position:absolute;bottom:28px;right:28px;display:flex;flex-direction:column;gap:8px;z-index:20}
    .fixed-btn{padding:9px 15px;background:rgba(14,14,30,0.92);border:1px solid var(--border-1);border-radius:8px;color:var(--txt-1);font-size:12px;font-weight:500;cursor:pointer;backdrop-filter:blur(10px);white-space:nowrap}
    .fixed-btn:hover{background:rgba(24,24,50,0.98)}

    /* Tooltip simplificado */
    #tooltip{position:fixed;z-index:200;pointer-events:none;background:rgba(0,0,0,0.88);border-radius:8px;padding:10px 14px;font-size:12px;color:#fff;max-width:220px;line-height:1.5;opacity:0;transition:opacity .15s}
    #tooltip.visible{opacity:1}
  </style>
</head>
<body>
  <canvas id="bg-canvas"></canvas>

  <!-- ===============  APLICATIVO  ================= -->
  <div id="app">
    <aside id="panel" aria-label="Painel de filtros e legenda">
      <button id="panel-toggle" title="Recolher painel" aria-label="Recolher painel"><span class="arrow">&#8249;</span></button>
      <div class="panel-inner">
        <div class="eyebrow">Rede de Co‑Citação</div>
        <h1 class="panel-title">Raça e Racismo<br>no Brasil<em>Web of Science · 2000–2025</em></h1>

        <!-- BUSCA -->
        <div class="search-wrap">
          <span class="search-icon">&#9906;</span>
          <input type="text" id="search-input" placeholder="Buscar autor…" autocomplete="off">
        </div>

        <!-- SLIDER PESO MÍNIMO -->
        <div class="weight-control" title="Ajuste o limiar de peso das co‑citações (filtra arestas)">
          <div class="weight-label">Peso mínimo: <span id="weight-val">8</span></div>
          <input type="range" id="weight-slider" min="1" max="20" value="8" step="1" aria-label="Peso mínimo das co‑citações">
        </div>

        <div class="divider" style="height:1px;background:var(--border-1);margin:20px 0"></div>
        <div class="legend-title eyebrow">Comunidades Temáticas</div>
        <div id="cluster-legend"></div>
      </div>
      <footer class="stats-footer" id="stats-footer" style="font-family:'Space Mono',monospace;font-size:10px;color:var(--txt-muted);padding:12px 20px 14px"></footer>
    </aside>

    <!-- AREA CANVAS -->
    <div id="canvas-area">
      <svg id="viz-svg"><defs><filter id="node-glow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs><g id="zoom-group"><g id="edges-layer"></g><g id="nodes-layer"></g><g id="labels-layer"></g><g id="cluster-labels-layer"></g></g></svg>
      <div id="tooltip"><div id="tt-name" style="font-weight:600"></div><div id="tt-cluster" style="font-size:10px"></div><div id="tt-degree" style="font-size:11px"></div></div>
      <div id="fixed-buttons"><button class="fixed-btn" id="btn-reset" style="display:none">&#8634; Visão geral</button><button class="fixed-btn" id="btn-export">&#8595; PNG</button></div>
    </div>
  </div>

  <!-- ===============  SCRIPT PRINCIPAL  ================= -->
  <script>
  /* ------------------------------------------------------
        0 · CONSTANTES & VARIÁVEIS GLOBAIS
  ------------------------------------------------------ */
  const TABLEAU10 = d3.schemeTableau10;  // paleta segura para daltonismo
  let WEIGHT_THRESHOLD = 8;
  let rawNodes = [], rawEdges = [];
  let currentData = null, simulation = null;

  // nome + cor para clusters mapeados manualmente (opcional)
  const CLUSTER_NAMES = {
    '69':'Identidade, Raça e Diáspora',
    '32':'Teoria Social Brasileira',
    '43':'Teoria Crítica e Interseccionalidade',
    '72':'Saúde e Epidemiologia Racial',
    '67':'Relações Raciais e Estratificação'
  };
  const clusterKeys = Object.keys(CLUSTER_NAMES);
  function clusterColor(mc){
    const idx = clusterKeys.indexOf(mc);
    return TABLEAU10[idx>-1?idx: (clusterKeys.length + (parseInt(mc)||0)) % TABLEAU10.length];
  }

  /* ------------------------------------------------------
        1 · CARREGAR GEXF  (usa fetch local ou remoto)
  ------------------------------------------------------ */
  const DEFAULT_GEXF = 'rede_WoS_racismo_teste.gexf';
  fetch(DEFAULT_GEXF).then(r=>r.text()).then(xmlText=>{
      const {nodes,edges} = parseGEXF(xmlText);
      rawNodes = nodes; rawEdges = edges;
      rebuild();
  });

  /* ------------------------------------------------------
        2 · PARSER  (igual v1, simplificado aqui)
  ------------------------------------------------------ */
  function parseGEXF(xmlText){
    const doc = new DOMParser().parseFromString(xmlText,'text/xml');
    const nodes = [...doc.querySelectorAll('node')].map(n=>({
      id:n.getAttribute('id'), label:(n.getAttribute('label')||'').toLowerCase(),
      modClass:(n.querySelector('attvalue')||{}).getAttribute?.('value')||'0',
      px:parseFloat(n.querySelector('position')?.getAttribute('x')||0),
      py:parseFloat(n.querySelector('position')?.getAttribute('y')||0)
    }));
    const edges = [...doc.querySelectorAll('edge')].map(e=>({
      source:e.getAttribute('source'), target:e.getAttribute('target'), weight:+e.getAttribute('weight')||1
    }));
    return {nodes,edges};
  }

  /* ------------------------------------------------------
        3 · PROCESSAR & RECONSTRUIR GRÁFICO
  ------------------------------------------------------ */
  function processGraph(){
    // filtra edges pelo weight, recalcula grau
    const fltEdges = rawEdges.filter(e=>e.weight>=WEIGHT_THRESHOLD);
    const nodeMap = new Map(rawNodes.map(n=>[n.id, {...n, degree:0}]));
    fltEdges.forEach(e=>{ if(nodeMap.has(e.source)&&nodeMap.has(e.target)){ nodeMap.get(e.source).degree++; nodeMap.get(e.target).degree++; } });
    const nodes = [...nodeMap.values()].filter(n=>n.degree>0);
    const edges = fltEdges.filter(e=>nodeMap.has(e.source)&&nodeMap.has(e.target));
    // propriedades visuais
    const maxDeg = d3.max(nodes,n=>n.degree)||1;
    nodes.forEach(n=>{
      n.size = 3 + Math.pow(n.degree/maxDeg,0.45)*20;
      n.clusterColor = clusterColor(n.modClass);
      n.clusterName = CLUSTER_NAMES[n.modClass]||('Cluster '+n.modClass);
    });
    return {nodes,edges};
  }

  function rebuild(){
    // limpa vis
    d3.select('#edges-layer').selectAll('*').remove();
    d3.select('#nodes-layer').selectAll('*').remove();
    d3.select('#labels-layer').selectAll('*').remove();
    d3.select('#cluster-labels-layer').selectAll('*').remove();
    simulation?.stop();

    currentData = processGraph();
    buildViz(currentData);
  }

  /* ------------------------------------------------------
        4 · BUILD VIZ (condensado – mantive partes v1)
  ------------------------------------------------------ */
  function buildViz({nodes,edges}){
    const svg = d3.select('#viz-svg');
    const W = svg.node().clientWidth, H = svg.node().clientHeight;
    // posições iniciais vindas do Gephi
    const scaleX = d3.scaleLinear(d3.extent(nodes,n=>n.px), [W*0.1,W*0.9]);
    const scaleY = d3.scaleLinear(d3.extent(nodes,n=>n.py), [H*0.9,H*0.1]);
    nodes.forEach(n=>{n.x=scaleX(n.px); n.y=scaleY(n.py);});

    const edgeSel = d3.select('#edges-layer').selectAll('line').data(edges).join('line')
      .attr('stroke', e=>clusterColor(nodes.find(n=>n.id===e.source).modClass))
      .attr('stroke-width', e=>0.5+Math.sqrt(e.weight))
      .attr('stroke-opacity', e=>Math.min(0.8,e.weight/20));

    const nodeSel = d3.select('#nodes-layer').selectAll('circle').data(nodes).join('circle')
      .attr('r',d=>d.size).attr('fill',d=>d.clusterColor).attr('stroke','#000').attr('stroke-width',0.5)
      .on('mouseenter', (ev,d)=>showTooltip(ev,d)).on('mouseleave', hideTooltip);

    const labelSel = d3.select('#labels-layer').selectAll('text').data(nodes).join('text')
      .text(d=>d.label).attr('text-anchor','middle').attr('font-size','11px').attr('fill',varTxt1())
      .style('display','none');

    function varTxt1(){return getComputedStyle(document.documentElement).getPropertyValue('--txt-1');}

    const zoom = d3.zoom().scaleExtent([0.1,8]).on('zoom',ev=>{
      d3.select('#zoom-group').attr('transform',ev.transform);
      // labels adaptativos
      labelSel.style('display',d=> (d.degree>8 || ev.transform.k>1.2)? null : 'none');
    });
    svg.call(zoom);

    simulation = d3.forceSimulation(nodes)
      .alphaDecay(0.06).velocityDecay(0.6).alphaMin(0.002)
      .force('link', d3.forceLink(edges).id(d=>d.id).distance(20).strength(0.1))
      .force('charge', d3.forceManyBody().strength(-50))
      .force('center', d3.forceCenter(W/2,H/2))
      .on('tick',()=>{
        edgeSel.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
        nodeSel.attr('cx',d=>d.x).attr('cy',d=>d.y);
        labelSel.attr('x',d=>d.x).attr('y',d=>d.y-d.size-3);
      });

    buildLegend(nodes);
    document.getElementById('stats-footer').innerHTML = `${nodes.length} autores · ${edges.length} co‑citações`;
  }

  /* ------------------------------------------------------
        5 · LEGEND & INTERAÇÃO CLUSTER OFF/ON
  ------------------------------------------------------ */
  const clusterVisible = new Map();
  function buildLegend(nodes){
    const legend = document.getElementById('cluster-legend'); legend.innerHTML='';
    const countBy = d3.rollup(nodes,v=>v.length,n=>n.modClass);
    [...countBy.entries()].sort((a,b)=>b[1]-a[1]).forEach(([mc,ct])=>{
      const item=document.createElement('div'); item.className='legend-item active'; item.dataset.mc=mc;
      item.innerHTML=`<span class="legend-dot" style="background:${clusterColor(mc)}"></span><span class="legend-name">${CLUSTER_NAMES[mc]||('Cluster '+mc)}</span><span class="legend-count">${ct}</span>`;
      clusterVisible.set(mc,true);
      item.onclick=()=>toggleCluster(mc,item);
      legend.appendChild(item);
    });
  }
  function toggleCluster(mc,itemEl){
    const isOn = clusterVisible.get(mc); clusterVisible.set(mc,!isOn);
    itemEl.classList.toggle('active');
    d3.select('#nodes-layer').selectAll('circle').filter(d=>d.modClass===mc).style('display', isOn?'none':null);
    d3.select('#edges-layer').selectAll('line').filter(d=>{
      return d.source.modClass===mc || d.target.modClass===mc;
    }).style('display', isOn?'none':null);
  }

  /* ------------------------------------------------------
        6 · TOOLTIP BÁSICO
  ------------------------------------------------------ */
  function showTooltip(ev,d){
    const tt=document.getElementById('tooltip');
    document.getElementById('tt-name').textContent=d.label;
    document.getElementById('tt-cluster').textContent=d.clusterName;
    document.getElementById('tt-degree').textContent=`${d.degree} co‑citações`;
    tt.classList.add('visible');
    tt.style.left=Math.min(ev.clientX+14,window.innerWidth-tt.offsetWidth-8)+'px';
    tt.style.top=Math.min(ev.clientY-10,window.innerHeight-tt.offsetHeight-8)+'px';
  }
  function hideTooltip(){document.getElementById('tooltip').classList.remove('visible');}

  /* ------------------------------------------------------
        7 · SLIDER & PANEL TOGGLE
  ------------------------------------------------------ */
  const slider = document.getElementById('weight-slider');
  slider.oninput = e=>{ document.getElementById('weight-val').textContent = e.target.value; };
  slider.onchange = e=>{ WEIGHT_THRESHOLD = +e.target.value; rebuild(); };

  const panel = document.getElementById('panel');
  document.getElementById('panel-toggle').onclick=()=>panel.classList.toggle('collapsed');
  // tecla "h" mostra/oculta painel
  document.addEventListener('keyup',e=>{ if(e.key.toLowerCase()==='h'){ panel.classList.toggle('collapsed'); } });

  /* ------------------------------------------------------
        8 · EXPORT PNG  (usa HTML2Canvas rápido)
  ------------------------------------------------------ */
  document.getElementById('btn-export').onclick=async()=>{
    const {toPng}=await import('https://cdn.jsdelivr.net/npm/html-to-image@1.11.11/+esm');
    const dataUrl = await toPng(document.getElementById('canvas-area'));
    const link=document.createElement('a'); link.download='rede_cocitacao.png'; link.href=dataUrl; link.click();
  };

  /* Função utilitária para texto de contraste (light/dark) */
  function isDarkTheme(){return getComputedStyle(document.documentElement).getPropertyValue('--bg-1').trim().startsWith('#0');}

  </script>
</body>
</html>
