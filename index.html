<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rede de Co-citação — Raça e Racismo no Brasil</title>
  <script src="https://cdn.jsdelivr.net/npm/graphology@0.25.4/dist/graphology.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sigma@2.4.0/build/sigma.min.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0a0a18; color:#e0e0f0; font-family:'Inter',system-ui,sans-serif; overflow:hidden; height:100vh; width:100vw; }
    #wrapper { position:relative; width:100vw; height:100vh; }
    #hull-canvas { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:1; }
    #sigma-container { position:absolute; top:0; left:0; width:100%; height:100%; z-index:2; }
    .sigma-hovers { display:none !important; }

    #panel {
      position:absolute; top:20px; left:20px; width:280px;
      background:rgba(10,10,24,0.93); border:1px solid rgba(255,255,255,0.08);
      border-radius:14px; backdrop-filter:blur(14px); z-index:10; overflow:hidden;
    }
    #panel-header { padding:16px 18px 12px; cursor:pointer; user-select:none; border-bottom:1px solid rgba(255,255,255,0.06); }
    #panel-header h1 { font-size:13px; font-weight:700; color:#fff; line-height:1.3; }
    #panel-header p { font-size:10px; color:rgba(255,255,255,0.38); margin-top:3px; }
    #panel-toggle { font-size:10px; color:rgba(255,255,255,0.3); float:right; margin-top:2px; }
    #panel-body { padding:14px 18px; }
    #panel.collapsed #panel-body { display:none; }

    #search { width:100%; background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.1); border-radius:8px; padding:8px 12px; color:#fff; font-size:11px; outline:none; margin-bottom:14px; }
    #search:focus { border-color:rgba(255,255,255,0.28); }
    #search::placeholder { color:rgba(255,255,255,0.28); }
    #suggestions { position:absolute; background:#13132a; border:1px solid rgba(255,255,255,0.1); border-radius:8px; max-height:150px; overflow-y:auto; z-index:100; display:none; width:248px; }
    .suggestion { padding:7px 12px; font-size:11px; cursor:pointer; color:#ccd; }
    .suggestion:hover, .suggestion.active { background:rgba(255,255,255,0.08); color:#fff; }

    .stats { display:flex; gap:8px; margin-bottom:14px; }
    .stat { flex:1; background:rgba(255,255,255,0.04); border-radius:8px; padding:8px 6px; text-align:center; }
    .stat-value { font-size:15px; font-weight:700; color:#fff; }
    .stat-label { font-size:8.5px; color:rgba(255,255,255,0.3); text-transform:uppercase; letter-spacing:0.06em; margin-top:1px; }

    .divider { height:1px; background:rgba(255,255,255,0.06); margin:10px 0; }
    .legend-title { font-size:10px; color:rgba(255,255,255,0.32); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:8px; }
    .legend-item { display:flex; align-items:center; gap:8px; padding:5px 8px; border-radius:6px; cursor:pointer; transition:background 0.15s; margin-bottom:2px; }
    .legend-item:hover { background:rgba(255,255,255,0.06); }
    .legend-item.active { background:rgba(255,255,255,0.1); }
    .legend-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
    .legend-label { font-size:10px; color:#bbc; line-height:1.2; }

    #btn-row { display:flex; gap:6px; margin-top:12px; }
    .btn { flex:1; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); border-radius:7px; color:rgba(255,255,255,0.55); font-size:10px; padding:6px 4px; cursor:pointer; text-align:center; transition:all 0.15s; }
    .btn:hover { background:rgba(255,255,255,0.12); color:#fff; }

    #tooltip { position:absolute; background:rgba(10,10,24,0.96); border:1px solid rgba(255,255,255,0.12); border-radius:10px; padding:10px 14px; font-size:11px; pointer-events:none; z-index:20; display:none; max-width:210px; backdrop-filter:blur(8px); }
    #tooltip strong { display:block; font-size:12px; color:#fff; margin-bottom:5px; }
    #tooltip .tt-row { display:flex; justify-content:space-between; gap:12px; color:rgba(255,255,255,0.45); margin-top:2px; }
    #tooltip .tt-val { color:#ccd; font-weight:600; }

    #node-panel { position:absolute; bottom:24px; right:24px; width:245px; background:rgba(10,10,24,0.95); border:1px solid rgba(255,255,255,0.1); border-radius:14px; padding:16px; z-index:10; display:none; backdrop-filter:blur(12px); }
    #node-panel .np-close { float:right; cursor:pointer; color:rgba(255,255,255,0.3); font-size:16px; line-height:1; }
    #node-panel .np-close:hover { color:#fff; }
    #node-panel .np-name { font-size:14px; font-weight:700; color:#fff; margin-bottom:8px; padding-right:20px; }
    #node-panel .np-cluster { display:inline-block; font-size:10px; font-weight:600; border-radius:20px; padding:3px 10px; margin-bottom:10px; }
    #node-panel .np-row { display:flex; justify-content:space-between; font-size:11px; color:rgba(255,255,255,0.4); padding:4px 0; border-top:1px solid rgba(255,255,255,0.05); }
    #node-panel .np-row span { color:#ccd; font-weight:600; }

    #loading { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; background:#0a0a18; z-index:50; }
    #loading .ld-title { font-size:18px; font-weight:700; color:#fff; margin-bottom:6px; }
    #loading .ld-sub { font-size:12px; color:rgba(255,255,255,0.38); margin-bottom:24px; }
    #loading .ld-bar-wrap { width:200px; height:3px; background:rgba(255,255,255,0.1); border-radius:2px; overflow:hidden; }
    #loading .ld-bar { height:100%; background:linear-gradient(90deg,#8b6fff,#2ecda7); animation:ldpulse 1.2s ease-in-out infinite; }
    @keyframes ldpulse { 0%,100%{width:20%;margin-left:0} 50%{width:60%;margin-left:40%} }
  </style>
</head>
<body>
<div id="wrapper">
  <canvas id="hull-canvas"></canvas>
  <div id="sigma-container"></div>

  <div id="panel">
    <div id="panel-header" onclick="togglePanel()">
      <span id="panel-toggle">▲</span>
      <h1>Rede de Co-citação<br>Raça e Racismo no Brasil</h1>
      <p>Web of Science · 2000–2025</p>
    </div>
    <div id="panel-body">
      <div style="position:relative">
        <input id="search" type="text" placeholder="Buscar autor..." autocomplete="off">
        <div id="suggestions"></div>
      </div>
      <div class="stats">
        <div class="stat"><div class="stat-value" id="stat-nodes">—</div><div class="stat-label">Autores</div></div>
        <div class="stat"><div class="stat-value" id="stat-edges">—</div><div class="stat-label">Co-citações</div></div>
        <div class="stat"><div class="stat-value" id="stat-clusters">—</div><div class="stat-label">Clusters</div></div>
      </div>
      <div class="divider"></div>
      <div class="legend-title">Comunidades Temáticas</div>
      <div id="legend"></div>
      <div id="btn-row">
        <div class="btn" onclick="resetView()">↺ Resetar</div>
        <div class="btn" onclick="exportPNG()">↓ Exportar</div>
      </div>
    </div>
  </div>

  <div id="tooltip"></div>
  <div id="node-panel">
    <span class="np-close" onclick="closeNodePanel()">×</span>
    <div class="np-name" id="np-name"></div>
    <div class="np-cluster" id="np-cluster"></div>
    <div class="np-row">Citações no corpus <span id="np-cit">—</span></div>
    <div class="np-row">Conexões <span id="np-deg">—</span></div>
    <div class="np-row">Força dos laços <span id="np-str">—</span></div>
  </div>

  <div id="loading">
    <div class="ld-title">Carregando rede...</div>
    <div class="ld-sub">Web of Science · Raça e Racismo no Brasil</div>
    <div class="ld-bar-wrap"><div class="ld-bar"></div></div>
  </div>
</div>

<script>
// ── Configuração ──────────────────────────────────────────
const GEXF_FILE  = 'rede_WoS_racismo_teste.gexf';
const WEIGHT_MIN = 8;
const NODE_SCALE = 1.0;

// Clusters conhecidos (Gephi modularity class → nome e cor)
const CLUSTERS = {
  69: { name: 'Identidade, Raça e Diáspora',         color: '#c87cff' },
  32: { name: 'Teoria Social Brasileira',             color: '#82c914' },
  43: { name: 'Teoria Crítica e Interseccionalidade', color: '#00c4ff' },
  72: { name: 'Saúde e Epidemiologia Racial',         color: '#00d2a0' },
  67: { name: 'Relações Raciais e Estratificação',    color: '#ff9020' },
};

// Paleta para clusters desconhecidos (atribuída dinamicamente)
const EXTRA_COLORS = ['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff922b','#cc5de8','#20c997','#f06595'];
const _autoCluster = {};
function clusterInfo(m) {
  if (CLUSTERS[m]) return CLUSTERS[m];
  if (!_autoCluster[m]) {
    const idx = Object.keys(_autoCluster).length % EXTRA_COLORS.length;
    _autoCluster[m] = { name: `Cluster ${m}`, color: EXTRA_COLORS[idx] };
  }
  return _autoCluster[m];
}

// ── Estado ────────────────────────────────────────────────
let graph, renderer, camera;
let hoveredNode = null, selectedNode = null, highlightedCluster = null;
let hullCanvas, hullCtx, clusterNodes = {};

// ── Utilitários ───────────────────────────────────────────
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function hexToRgb(h) { return { r:parseInt(h.slice(1,3),16), g:parseInt(h.slice(3,5),16), b:parseInt(h.slice(5,7),16) }; }

// ── Parse GEXF ────────────────────────────────────────────
async function loadAndBuild() {
  const res = await fetch(GEXF_FILE);
  if (!res.ok) throw new Error('Não foi possível carregar ' + GEXF_FILE);
  const txt = await res.text();
  const xml = new DOMParser().parseFromString(txt, 'application/xml');
  buildGraph(xml);
}

function buildGraph(xml) {
  graph = new graphology.Graph({ multi:false, type:'undirected' });

  // 1. Ler todos os nós em mapa
  const rawMap = new Map();
  xml.querySelectorAll('nodes > node').forEach(n => {
    const pos = n.querySelector('position');
    const col = n.querySelector('color');
    const siz = n.querySelector('size');
    let mc=0, cit=0, str=0;
    n.querySelectorAll('attvalue').forEach(a => {
      switch(a.getAttribute('for')) {
        case 'modularity_class':          mc  = +a.getAttribute('value'); break;
        case 'weight<citations>':         cit = +a.getAttribute('value'); break;
        case 'weight<total_link_strength>': str = +a.getAttribute('value'); break;
      }
    });
    rawMap.set(n.getAttribute('id'), {
      id: n.getAttribute('id'),
      lb: n.getAttribute('label') || n.getAttribute('id'),
      x:  pos ? +pos.getAttribute('x') : 0,
      y:  pos ? +pos.getAttribute('y') : 0,
      sz: siz ? +siz.getAttribute('value') : 5,
      r:  col ? +col.getAttribute('r') : 128,
      g:  col ? +col.getAttribute('g') : 128,
      b:  col ? +col.getAttribute('b') : 128,
      mc, cit, str
    });
  });

  // 2. Filtrar arestas por peso e contar grau de cada nó
  const MIN_DEGREE = 2;
  const candidateEdges = [];
  const degree = new Map();
  xml.querySelectorAll('edges > edge').forEach(e => {
    const w = +(e.getAttribute('weight') || 1);
    if (w < WEIGHT_MIN) return;
    const s = e.getAttribute('source'), t = e.getAttribute('target');
    if (s === t || !rawMap.has(s) || !rawMap.has(t)) return;
    candidateEdges.push({ s, t, w });
    degree.set(s, (degree.get(s)||0) + 1);
    degree.set(t, (degree.get(t)||0) + 1);
  });

  // Manter só nós com grau >= MIN_DEGREE
  const connectedIds = new Set();
  degree.forEach((deg, id) => { if (deg >= MIN_DEGREE) connectedIds.add(id); });

  // Manter só arestas onde ambos os endpoints sobrevivem
  const validEdges = candidateEdges.filter(({s,t}) => connectedIds.has(s) && connectedIds.has(t));

  // 3. Calcular centro e escala dinâmica a partir dos nós conectados
  let sumX=0, sumY=0, minX=Infinity, maxX=-Infinity, minY=Infinity, maxY=-Infinity;
  connectedIds.forEach(id => {
    const n=rawMap.get(id);
    sumX+=n.x; sumY+=n.y;
    if(n.x<minX)minX=n.x; if(n.x>maxX)maxX=n.x;
    if(n.y<minY)minY=n.y; if(n.y>maxY)maxY=n.y;
  });
  const cx = sumX/connectedIds.size, cy = sumY/connectedIds.size;
  // Escala para caber em ±10 unidades Sigma
  const range = Math.max(maxX-minX, maxY-minY) || 1;
  const COORD_SCALE = 20 / range;

  // 4. Adicionar todos os nós conectados (sem filtro de distância)
  const keptIds = connectedIds;

  connectedIds.forEach(id => {
    const n = rawMap.get(id);
    const ci = clusterInfo(n.mc);
    graph.addNode(n.id, {
      label: n.lb,
      x: (n.x-cx)*COORD_SCALE,
      y: -(n.y-cy)*COORD_SCALE,
      size: clamp(n.sz*NODE_SCALE, 3, 22),
      color: `rgb(${n.r},${n.g},${n.b})`,
      clusterColor: ci.color,
      clusterName:  ci.name,
      modClass: n.mc, cit: n.cit, str: n.str,
    });
    if (!clusterNodes[n.mc]) clusterNodes[n.mc] = [];
    clusterNodes[n.mc].push(n.id);
  });

  // 5. Adicionar arestas (deduplicar, só entre nós mantidos)
  const seen = new Set();
  let eCount = 0;
  validEdges.forEach(({ s, t, w }) => {
    if (!keptIds.has(s) || !keptIds.has(t)) return;
    const key = s < t ? `${s}|${t}` : `${t}|${s}`;
    if (seen.has(key)) return;
    seen.add(key);
    graph.addEdge(s, t, { weight:w, hidden:true });
    eCount++;
  });

  document.getElementById('stat-nodes').textContent    = graph.order;
  document.getElementById('stat-edges').textContent    = eCount;
  document.getElementById('stat-clusters').textContent = Object.keys(CLUSTERS).filter(k=>clusterNodes[k]).length;
}

// ── Legenda ───────────────────────────────────────────────
function buildLegend() {
  const el = document.getElementById('legend');
  el.innerHTML = '';
  Object.entries(CLUSTERS).forEach(([cls, info]) => {
    if (!clusterNodes[cls]?.length) return;
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.dataset.cls = cls;
    item.innerHTML = `<div class="legend-dot" style="background:${info.color}"></div><div class="legend-label">${info.name}</div>`;
    item.addEventListener('click', () => toggleCluster(+cls));
    el.appendChild(item);
  });
}

// ── Sigma ─────────────────────────────────────────────────
function initSigma() {
  renderer = new Sigma(graph, document.getElementById('sigma-container'), {
    renderEdgeLabels: false,
    labelFont: 'Inter,system-ui,sans-serif',
    labelSize: 11,
    labelWeight: '500',
    labelColor: { color:'#dde' },
    minCameraRatio: 0.04,
    maxCameraRatio: 6,

    nodeReducer: (node, data) => {
      const res = { ...data };
      const active = hoveredNode ?? selectedNode;
      if (active !== null) {
        if (node === active) { res.highlighted=true; res.size=data.size*1.4; }
        else if (graph.neighbors(active).includes(node)) { /* normal */ }
        else { res.color='rgba(60,60,80,0.3)'; res.label=''; }
      } else if (highlightedCluster !== null) {
        if (data.modClass !== highlightedCluster) { res.color='rgba(60,60,80,0.25)'; res.label=''; res.size=data.size*0.7; }
      }
      return res;
    },

    edgeReducer: (edge, data) => {
      const res = { ...data };
      const [s, t] = graph.extremities(edge);
      const active = hoveredNode ?? selectedNode;

      if (active !== null) {
        if (s===active || t===active) {
          const { r,g,b } = hexToRgb(graph.getNodeAttribute(s,'clusterColor'));
          res.hidden = false;
          res.color  = `rgba(${r},${g},${b},0.6)`;
          res.size   = clamp(data.weight/12, 0.4, 2.5);
        } else { res.hidden=true; }
        return res;
      }

      if (highlightedCluster !== null) {
        const sm = graph.getNodeAttribute(s,'modClass');
        const tm = graph.getNodeAttribute(t,'modClass');
        if (sm===highlightedCluster && tm===highlightedCluster) {
          const { r,g,b } = hexToRgb(CLUSTERS[highlightedCluster]?.color||'#888888');
          res.hidden=false; res.color=`rgba(${r},${g},${b},0.35)`; res.size=0.5;
        } else { res.hidden=true; }
        return res;
      }

      res.hidden = true;
      return res;
    },
  });

  camera = renderer.getCamera();

  renderer.on('enterNode', ({node}) => { hoveredNode=node; showTooltip(node); renderer.refresh(); drawHulls(); });
  renderer.on('leaveNode', ()       => { hoveredNode=null; hideTooltip(); renderer.refresh(); drawHulls(); });
  renderer.on('clickNode', ({node}) => {
    selectedNode = selectedNode===node ? null : node;
    if (selectedNode) showNodePanel(node); else closeNodePanel();
    renderer.refresh();
  });
  renderer.on('clickStage', () => {
    selectedNode=null; highlightedCluster=null;
    closeNodePanel();
    document.querySelectorAll('.legend-item').forEach(e=>e.classList.remove('active'));
    renderer.refresh(); drawHulls();
  });
  renderer.on('afterRender', drawHulls);
}

// ── Tooltip ───────────────────────────────────────────────
function showTooltip(node) {
  const d = graph.getNodeAttributes(node);
  document.getElementById('tooltip').innerHTML = `
    <strong>${d.label}</strong>
    <div class="tt-row">Cluster <span class="tt-val">${d.clusterName}</span></div>
    <div class="tt-row">Citações <span class="tt-val">${Math.round(d.cit)}</span></div>
    <div class="tt-row">Conexões <span class="tt-val">${graph.degree(node)}</span></div>`;
  document.getElementById('tooltip').style.display = 'block';
}
function hideTooltip() { document.getElementById('tooltip').style.display='none'; }
document.addEventListener('mousemove', e => {
  const tip = document.getElementById('tooltip');
  if (tip.style.display==='none') return;
  tip.style.left = Math.min(e.clientX+16, window.innerWidth-220)+'px';
  tip.style.top  = Math.min(e.clientY-10, window.innerHeight-150)+'px';
});

// ── Painel de nó ──────────────────────────────────────────
function showNodePanel(node) {
  const d = graph.getNodeAttributes(node);
  const ci = clusterInfo(d.modClass);
  document.getElementById('np-name').textContent = d.label;
  document.getElementById('np-cit').textContent  = Math.round(d.cit);
  document.getElementById('np-deg').textContent  = graph.degree(node);
  document.getElementById('np-str').textContent  = Math.round(d.str);
  const cl = document.getElementById('np-cluster');
  cl.textContent = ci.name;
  const {r,g,b} = hexToRgb(ci.color);
  cl.style.background = `rgba(${r},${g},${b},0.18)`; cl.style.color = ci.color;
  document.getElementById('node-panel').style.display = 'block';
}
function closeNodePanel() {
  document.getElementById('node-panel').style.display='none'; selectedNode=null;
}

// ── Hulls (áreas de cluster) ──────────────────────────────
function drawHulls() {
  hullCtx.clearRect(0, 0, hullCanvas.width, hullCanvas.height);
  Object.keys(CLUSTERS).map(Number).forEach(cls => {
    const nodes = clusterNodes[cls];
    if (!nodes || nodes.length < 3) return;
    const pts = nodes.filter(n=>graph.hasNode(n))
                     .map(n => renderer.graphToViewport(graph.getNodeAttributes(n)));
    if (pts.length < 3) return;
    const hull = convexHull(pts);
    if (hull.length < 3) return;
    const {r,g,b} = hexToRgb(CLUSTERS[cls].color);
    let a = 0.055;
    if (highlightedCluster !== null) a = highlightedCluster===cls ? 0.15 : 0.015;
    if (hoveredNode !== null) {
      const hm = graph.getNodeAttribute(hoveredNode,'modClass');
      a = hm===cls ? 0.1 : 0.02;
    }
    hullCtx.beginPath();
    drawSmooth(hull, 32);
    hullCtx.fillStyle   = `rgba(${r},${g},${b},${a})`;
    hullCtx.strokeStyle = `rgba(${r},${g},${b},${a*2})`;
    hullCtx.lineWidth   = 1.5;
    hullCtx.fill(); hullCtx.stroke();
  });
}

function convexHull(pts) {
  const p = [...pts].sort((a,b)=>a.x-b.x||a.y-b.y);
  const cross=(O,A,B)=>(A.x-O.x)*(B.y-O.y)-(A.y-O.y)*(B.x-O.x);
  const lo=[], hi=[];
  for (const q of p) { while(lo.length>=2&&cross(lo[lo.length-2],lo[lo.length-1],q)<=0)lo.pop(); lo.push(q); }
  for (let i=p.length-1;i>=0;i--) { const q=p[i]; while(hi.length>=2&&cross(hi[hi.length-2],hi[hi.length-1],q)<=0)hi.pop(); hi.push(q); }
  hi.pop(); lo.pop(); return lo.concat(hi);
}

function drawSmooth(pts, pad) {
  const cx=pts.reduce((s,p)=>s+p.x,0)/pts.length;
  const cy=pts.reduce((s,p)=>s+p.y,0)/pts.length;
  const exp=pts.map(p=>{const d=Math.hypot(p.x-cx,p.y-cy)||1;return{x:p.x+(p.x-cx)/d*pad,y:p.y+(p.y-cy)/d*pad};});
  hullCtx.moveTo((exp[0].x+exp[exp.length-1].x)/2,(exp[0].y+exp[exp.length-1].y)/2);
  exp.forEach((p,i)=>{const q=exp[(i+1)%exp.length];hullCtx.quadraticCurveTo(p.x,p.y,(p.x+q.x)/2,(p.y+q.y)/2);});
  hullCtx.closePath();
}

// ── Busca ─────────────────────────────────────────────────
function setupSearch() {
  const inp  = document.getElementById('search');
  const sugg = document.getElementById('suggestions');
  let idx = -1;
  inp.addEventListener('input', () => {
    const q = inp.value.toLowerCase().trim();
    sugg.innerHTML=''; idx=-1;
    if (!q) { sugg.style.display='none'; return; }
    const m = graph.nodes().filter(n=>graph.getNodeAttribute(n,'label').toLowerCase().includes(q)).slice(0,8);
    if (!m.length) { sugg.style.display='none'; return; }
    m.forEach(n=>{
      const d=document.createElement('div'); d.className='suggestion';
      d.textContent=graph.getNodeAttribute(n,'label');
      d.onclick=()=>{ focusNode(n); sugg.style.display='none'; inp.value=''; };
      sugg.appendChild(d);
    });
    sugg.style.display='block';
  });
  inp.addEventListener('keydown', e=>{
    const items=sugg.querySelectorAll('.suggestion');
    if (e.key==='ArrowDown') idx=Math.min(idx+1,items.length-1);
    else if (e.key==='ArrowUp') idx=Math.max(idx-1,0);
    else if (e.key==='Enter'&&idx>=0){items[idx].click();return;}
    else if (e.key==='Escape'){sugg.style.display='none';return;}
    items.forEach((el,i)=>el.classList.toggle('active',i===idx));
  });
  document.addEventListener('click', e=>{ if(!inp.contains(e.target)&&!sugg.contains(e.target)) sugg.style.display='none'; });
}

function focusNode(node) {
  const a = graph.getNodeAttributes(node);
  camera.animate({x:a.x, y:a.y, ratio:0.3}, {duration:500});
  selectedNode=node; showNodePanel(node); renderer.refresh();
}

// ── Cluster highlight ─────────────────────────────────────
function toggleCluster(cls) {
  highlightedCluster = highlightedCluster===cls ? null : cls;
  document.querySelectorAll('.legend-item').forEach(el=>el.classList.toggle('active', +el.dataset.cls===cls && highlightedCluster!==null));
  renderer.refresh(); drawHulls();
}

// ── Controles ─────────────────────────────────────────────
function togglePanel() {
  const p=document.getElementById('panel');
  p.classList.toggle('collapsed');
  document.getElementById('panel-toggle').textContent = p.classList.contains('collapsed')?'▼':'▲';
}
function resetView() {
  hoveredNode=null; selectedNode=null; highlightedCluster=null;
  closeNodePanel();
  document.querySelectorAll('.legend-item').forEach(e=>e.classList.remove('active'));
  camera.animate({x:0,y:0,ratio:1},{duration:500});
  renderer.refresh(); drawHulls();
}
function exportPNG() {
  const layers=renderer.getCanvases();
  const w=hullCanvas.width, h=hullCanvas.height;
  const out=document.createElement('canvas'); out.width=w; out.height=h;
  const ctx=out.getContext('2d');
  ctx.fillStyle='#0a0a18'; ctx.fillRect(0,0,w,h);
  ctx.drawImage(hullCanvas,0,0);
  Object.values(layers).forEach(c=>{try{ctx.drawImage(c,0,0);}catch(e){}});
  const a=document.createElement('a'); a.download='rede_racismo_wos.png'; a.href=out.toDataURL(); a.click();
}

// ── Hull canvas resize ────────────────────────────────────
function resizeHull() { hullCanvas.width=window.innerWidth; hullCanvas.height=window.innerHeight; drawHulls(); }

// ── Init ──────────────────────────────────────────────────
async function init() {
  hullCanvas = document.getElementById('hull-canvas');
  hullCtx    = hullCanvas.getContext('2d');
  resizeHull();
  window.addEventListener('resize', resizeHull);

  try {
    await loadAndBuild();
    buildLegend();
    initSigma();
    setupSearch();
    setTimeout(()=>{
      const ld=document.getElementById('loading');
      ld.style.transition='opacity 0.5s'; ld.style.opacity='0';
      setTimeout(()=>ld.style.display='none', 500);
    }, 300);
  } catch(err) {
    document.getElementById('loading').innerHTML=`
      <div class="ld-title" style="color:#ff6b6b">Erro ao carregar</div>
      <div class="ld-sub">${err.message}</div>
      <div class="ld-sub" style="margin-top:8px;font-size:10px">Arquivo esperado: <code style="color:#aaa">${GEXF_FILE}</code></div>`;
  }
}

init();
</script>
</body>
