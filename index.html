<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rede de Co-citação — Raça e Racismo no Brasil</title>
  <script src="https://cdn.jsdelivr.net/npm/graphology@0.25.4/dist/graphology.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sigma@2.4.0/build/sigma.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d0d1a;
      color: #e0e0f0;
      font-family: 'Inter', system-ui, sans-serif;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    #wrapper {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    /* Hull canvas — atrás do Sigma */
    #hull-canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    /* Container do Sigma */
    #sigma-container {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 2;
    }

    /* Esconde o layer de hover padrão do Sigma */
    .sigma-hovers { display: none !important; }

    /* ── Painel lateral ─────────────────────────────────────── */
    #panel {
      position: absolute;
      top: 20px; left: 20px;
      width: 280px;
      background: rgba(13,13,26,0.92);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      backdrop-filter: blur(12px);
      z-index: 10;
      overflow: hidden;
      transition: all 0.3s ease;
    }

    #panel-header {
      padding: 16px 18px 12px;
      cursor: pointer;
      user-select: none;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    #panel-header h1 {
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      line-height: 1.3;
      letter-spacing: 0.01em;
    }

    #panel-header p {
      font-size: 10px;
      color: rgba(255,255,255,0.4);
      margin-top: 3px;
    }

    #panel-toggle {
      font-size: 10px;
      color: rgba(255,255,255,0.3);
      float: right;
      margin-top: 2px;
    }

    #panel-body {
      padding: 14px 18px;
      transition: all 0.3s ease;
    }

    #panel.collapsed #panel-body { display: none; }

    /* Busca */
    #search-wrap {
      position: relative;
      margin-bottom: 14px;
    }

    #search {
      width: 100%;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 8px 12px;
      color: #fff;
      font-size: 11px;
      outline: none;
      transition: border-color 0.2s;
    }

    #search:focus { border-color: rgba(255,255,255,0.3); }
    #search::placeholder { color: rgba(255,255,255,0.3); }

    #suggestions {
      position: absolute;
      top: calc(100% + 4px);
      left: 0; right: 0;
      background: #1a1a2e;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      max-height: 160px;
      overflow-y: auto;
      z-index: 100;
      display: none;
    }

    .suggestion {
      padding: 7px 12px;
      font-size: 11px;
      cursor: pointer;
      color: #ccd;
      transition: background 0.15s;
    }

    .suggestion:hover, .suggestion.active {
      background: rgba(255,255,255,0.08);
      color: #fff;
    }

    /* Legenda */
    #legend { }

    .legend-title {
      font-size: 10px;
      color: rgba(255,255,255,0.35);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 8px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
      margin-bottom: 2px;
    }

    .legend-item:hover { background: rgba(255,255,255,0.06); }
    .legend-item.active { background: rgba(255,255,255,0.1); }

    .legend-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .legend-label {
      font-size: 10px;
      color: #bbc;
      line-height: 1.2;
    }

    /* Separador */
    .divider {
      height: 1px;
      background: rgba(255,255,255,0.06);
      margin: 12px 0;
    }

    /* Stats */
    .stats {
      display: flex;
      gap: 10px;
    }

    .stat {
      flex: 1;
      background: rgba(255,255,255,0.04);
      border-radius: 8px;
      padding: 8px 10px;
      text-align: center;
    }

    .stat-value {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
    }

    .stat-label {
      font-size: 9px;
      color: rgba(255,255,255,0.3);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-top: 1px;
    }

    /* Botões */
    #btn-row {
      display: flex;
      gap: 6px;
      margin-top: 10px;
    }

    .btn {
      flex: 1;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 7px;
      color: rgba(255,255,255,0.6);
      font-size: 10px;
      padding: 6px 4px;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
    }

    .btn:hover {
      background: rgba(255,255,255,0.12);
      color: #fff;
    }

    /* ── Tooltip de nó ──────────────────────────────────────── */
    #tooltip {
      position: absolute;
      background: rgba(13,13,26,0.95);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 11px;
      pointer-events: none;
      z-index: 20;
      display: none;
      max-width: 200px;
      backdrop-filter: blur(8px);
    }

    #tooltip strong {
      display: block;
      font-size: 12px;
      color: #fff;
      margin-bottom: 5px;
    }

    #tooltip .tt-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: rgba(255,255,255,0.5);
      margin-top: 2px;
    }

    #tooltip .tt-val { color: #ccd; font-weight: 600; }

    /* ── Painel de info de nó (clique) ──────────────────────── */
    #node-panel {
      position: absolute;
      bottom: 24px; right: 24px;
      width: 240px;
      background: rgba(13,13,26,0.94);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 16px;
      z-index: 10;
      display: none;
      backdrop-filter: blur(12px);
    }

    #node-panel .np-close {
      float: right;
      cursor: pointer;
      color: rgba(255,255,255,0.3);
      font-size: 16px;
      line-height: 1;
    }

    #node-panel .np-close:hover { color: #fff; }

    #node-panel .np-name {
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 10px;
      padding-right: 20px;
    }

    #node-panel .np-cluster {
      display: inline-block;
      font-size: 10px;
      font-weight: 600;
      border-radius: 20px;
      padding: 3px 10px;
      margin-bottom: 10px;
    }

    #node-panel .np-row {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      padding: 4px 0;
      border-top: 1px solid rgba(255,255,255,0.05);
    }

    #node-panel .np-row span { color: #ccd; font-weight: 600; }

    /* ── Loading ────────────────────────────────────────────── */
    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0d0d1a;
      z-index: 50;
    }

    #loading .ld-title {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 6px;
    }

    #loading .ld-sub {
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      margin-bottom: 24px;
    }

    #loading .ld-bar-wrap {
      width: 200px;
      height: 3px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      overflow: hidden;
    }

    #loading .ld-bar {
      height: 100%;
      background: linear-gradient(90deg, #7b6fff, #2ec4a7);
      border-radius: 2px;
      animation: ldpulse 1.2s ease-in-out infinite;
    }

    @keyframes ldpulse {
      0%, 100% { width: 20%; margin-left: 0; }
      50% { width: 60%; margin-left: 40%; }
    }

    /* ── Badge de cluster (canvas) ──────────────────────────── */
    #badge-canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 3;
    }
  </style>
</head>
<body>

<div id="wrapper">
  <canvas id="hull-canvas"></canvas>
  <div id="sigma-container"></div>
  <canvas id="badge-canvas"></canvas>

  <!-- Painel lateral -->
  <div id="panel">
    <div id="panel-header" onclick="togglePanel()">
      <span id="panel-toggle">▲</span>
      <h1>Rede de Co-citação<br>Raça e Racismo no Brasil</h1>
      <p>SciELO · Web of Science · 2000–2025</p>
    </div>
    <div id="panel-body">
      <div id="search-wrap">
        <input id="search" type="text" placeholder="Buscar autor..." autocomplete="off">
        <div id="suggestions"></div>
      </div>

      <div class="stats">
        <div class="stat">
          <div class="stat-value" id="stat-nodes">—</div>
          <div class="stat-label">Autores</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="stat-edges">—</div>
          <div class="stat-label">Co-citações</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="stat-clusters">—</div>
          <div class="stat-label">Clusters</div>
        </div>
      </div>

      <div class="divider"></div>
      <div class="legend-title">Comunidades temáticas</div>
      <div id="legend"></div>

      <div id="btn-row">
        <div class="btn" onclick="resetView()">↺ Resetar</div>
        <div class="btn" onclick="exportPNG()">↓ Exportar</div>
      </div>
    </div>
  </div>

  <!-- Tooltip -->
  <div id="tooltip"></div>

  <!-- Painel de nó clicado -->
  <div id="node-panel">
    <span class="np-close" onclick="closeNodePanel()">×</span>
    <div class="np-name" id="np-name"></div>
    <div class="np-cluster" id="np-cluster"></div>
    <div class="np-row">Co-citações <span id="np-cit"></span></div>
    <div class="np-row">Conexões <span id="np-deg"></span></div>
    <div class="np-row">Cluster <span id="np-cls"></span></div>
  </div>

  <!-- Loading -->
  <div id="loading">
    <div class="ld-title">Rede de Co-citação</div>
    <div class="ld-sub">Carregando dados...</div>
    <div class="ld-bar-wrap"><div class="ld-bar"></div></div>
  </div>
</div>

<script>
// ── Nomes dos clusters ────────────────────────────────────────────
// Atualize esses nomes conforme a análise dos clusters no Gephi
const clusterNames = {
  '0': 'Teoria Social Brasileira',
  '1': 'Teoria Crítica e Interseccionalidade',
  '2': 'Saúde e Epidemiologia Racial',
  '3': 'Relações Raciais Comparadas',
  '4': 'Sociologia Racial e Estratificação',
  '5': 'Estudos Africanos e Diáspora',
  '6': 'Pensamento Negro',
  '7': 'Antropologia e Mestiçagem'
};

// ── Estado global ─────────────────────────────────────────────────
let renderer, graph;
let hoveredNode = null;
let highlightedCluster = null;
let neighborSet = new Map();
let colorMap = {};
let nodeDataMap = {};
let cameraState = null;

// ── Parser GEXF ───────────────────────────────────────────────────
function parseGEXF(xml) {
  const doc = new DOMParser().parseFromString(xml, 'application/xml');
  const nodes = [], links = [];

  doc.querySelectorAll('node').forEach(el => {
    const id = el.getAttribute('id');
    const label = el.getAttribute('label') || id;
    const vc = el.querySelector('color');
    const vp = el.querySelector('position');
    const vs = el.querySelector('size');
    const modAv = el.querySelector('attvalue[for="modularity_class"]');
    const citAv = el.querySelector('attvalue[for="weight<citations>"]');
    const linksAv = el.querySelector('attvalue[for="weight<links>"]');
    nodes.push({
      id, label,
      r: vc ? +vc.getAttribute('r') : 128,
      g: vc ? +vc.getAttribute('g') : 128,
      b: vc ? +vc.getAttribute('b') : 128,
      gx: vp ? +vp.getAttribute('x') : 0,
      gy: vp ? +vp.getAttribute('y') : 0,
      gSize: vs ? +vs.getAttribute('value') : 3,
      modClass: modAv ? modAv.getAttribute('value') : '0',
      citations: citAv ? +citAv.getAttribute('value') : 0,
      links: linksAv ? +linksAv.getAttribute('value') : 0
    });
  });

  doc.querySelectorAll('edge').forEach(el => {
    links.push({
      id: el.getAttribute('id') || `${el.getAttribute('source')}-${el.getAttribute('target')}`,
      source: el.getAttribute('source'),
      target: el.getAttribute('target'),
      weight: +(el.getAttribute('weight') || 1)
    });
  });

  return { nodes, links };
}

// ── Carrega e inicializa ──────────────────────────────────────────
fetch('rede_WoS_racismo_teste.gexf')
  .then(r => r.text())
  .then(xml => {
    const { nodes, links } = parseGEXF(xml);
    buildGraph(nodes, links);
    document.getElementById('loading').style.display = 'none';
  })
  .catch(err => {
    console.error(err);
    document.getElementById('loading').innerHTML =
      '<div style="color:#ff5252;font-size:14px;">Erro ao carregar o arquivo GEXF.<br><small style="color:#888">Verifique se o arquivo está na mesma pasta.</small></div>';
  });

// ── Constrói o grafo ──────────────────────────────────────────────
function buildGraph(nodesData, linksData) {
  graph = new graphology.Graph({ type: 'undirected', multi: false });

  // ── Filtra arestas por peso mínimo
  const WEIGHT_MIN = 35;
  const filteredLinks = linksData.filter(l => l.weight >= WEIGHT_MIN);

  // Mantém só nós conectados
  const connectedIds = new Set();
  filteredLinks.forEach(l => { connectedIds.add(l.source); connectedIds.add(l.target); });
  const filteredNodes = nodesData.filter(n => connectedIds.has(n.id));

  // Escala Gephi → coordenadas normalizadas (Sigma usa ~0-1)
  const xs = filteredNodes.map(n => n.gx), ys = filteredNodes.map(n => n.gy);
  const xMin = Math.min(...xs), xMax = Math.max(...xs);
  const yMin = Math.min(...ys), yMax = Math.max(...ys);
  const rangeX = xMax - xMin, rangeY = yMax - yMin;
  // Mantém proporção e centraliza
  const scale = Math.max(rangeX, rangeY);
  const scX = v => (v - xMin) / scale;
  const scY = v => (v - yMin) / scale;

  // Grau para tamanho
  const degMap = {};
  filteredNodes.forEach(n => degMap[n.id] = 0);
  filteredLinks.forEach(l => {
    degMap[l.source] = (degMap[l.source]||0) + 1;
    degMap[l.target] = (degMap[l.target]||0) + 1;
  });
  const maxDeg = Math.max(...Object.values(degMap));

  // Mapa de cores por cluster (usa cor do GEXF, suaviza verde-limão)
  filteredNodes.forEach(n => {
    const cls = n.modClass;
    if (!colorMap[cls]) {
      // Verde-limão (140,185,0) → verde mais suave e escuro
      if (n.r === 140 && n.g === 185 && n.b === 0) {
        colorMap[cls] = `rgb(80,160,60)`;
      } else {
        colorMap[cls] = `rgb(${n.r},${n.g},${n.b})`;
      }
    }
  });

  // Aplica cor suavizada também nos nós
  filteredNodes.forEach(n => {
    if (n.r === 140 && n.g === 185 && n.b === 0) {
      n.r = 80; n.g = 160; n.b = 60;
    }
  });

  // Adiciona nós
  filteredNodes.forEach(n => {
    const deg = degMap[n.id] || 0;
    const t = Math.pow(deg / maxDeg, 0.5);
    const size = 3 + t * 18;
    const color = `rgb(${n.r},${n.g},${n.b})`;

    graph.addNode(n.id, {
      label: n.label,
      x: scX(n.gx),
      y: scY(n.gy),
      size,
      color,
      modClass: n.modClass,
      citations: n.citations,
      links: n.links,
      degree: deg
    });

    nodeDataMap[n.id] = { ...n, degree: deg, size, color };
  });

  // Adiciona arestas filtradas
  const addedEdges = new Set();
  filteredLinks.forEach(l => {
    const key = [l.source, l.target].sort().join('|');
    if (addedEdges.has(key)) return;
    if (!graph.hasNode(l.source) || !graph.hasNode(l.target)) return;
    if (l.source === l.target) return;
    try {
      // Cor da aresta baseada no cluster do nó fonte
      const srcColor = graph.getNodeAttribute(l.source, 'color') || 'rgb(128,128,128)';
      const rgb = srcColor.match(/\d+/g);
      graph.addEdge(l.source, l.target, {
        weight: l.weight,
        color: `rgba(${rgb[0]},${rgb[1]},${rgb[2]},0.12)`,
        size: 0.3
      });
      addedEdges.add(key);
    } catch(e) {}
  });

  // Pré-computa vizinhos
  graph.nodes().forEach(n => {
    neighborSet.set(n, new Set(graph.neighbors(n)));
  });

  // Atualiza stats
  const numClusters = Object.keys(colorMap).length;
  document.getElementById('stat-nodes').textContent = graph.order;
  document.getElementById('stat-edges').textContent = graph.size;
  document.getElementById('stat-clusters').textContent = numClusters;

  // Renderiza legenda
  renderLegend();

  // Inicializa Sigma
  initSigma();
}

// ── Legenda ───────────────────────────────────────────────────────
function renderLegend() {
  const el = document.getElementById('legend');
  el.innerHTML = '';
  Object.entries(colorMap).sort().forEach(([cls, color]) => {
    const name = clusterNames[cls] || `Cluster ${cls}`;
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.dataset.cls = cls;
    item.innerHTML = `
      <div class="legend-dot" style="background:${color};box-shadow:0 0 5px ${color}"></div>
      <div class="legend-label">${name}</div>
    `;
    item.addEventListener('click', () => toggleClusterHighlight(cls));
    el.appendChild(item);
  });
}

// ── Inicializa Sigma ──────────────────────────────────────────────
function initSigma() {
  const container = document.getElementById('sigma-container');

  renderer = new Sigma(graph, container, {
    renderEdgeLabels: false,
    defaultEdgeType: 'line',
    labelFont: 'Inter, system-ui, sans-serif',
    labelSize: 11,
    labelWeight: '600',
    labelColor: { color: '#e8e8f0' },
    labelBackgroundColor: 'transparent',
    labelRenderedSizeThreshold: 4,
    minCameraRatio: 0.05,
    maxCameraRatio: 20,

    nodeReducer: (node, data) => {
      const res = { ...data };

      // Destaque por cluster
      if (highlightedCluster !== null) {
        if (data.modClass !== highlightedCluster) {
          res.color = 'rgba(255,255,255,0.04)';
          res.label = '';
          res.size = data.size * 0.5;
        }
      }

      // Destaque por hover
      if (hoveredNode !== null) {
        if (node === hoveredNode) {
          res.highlighted = true;
          res.size = data.size * 1.4;
        } else if (neighborSet.get(hoveredNode)?.has(node)) {
          res.color = data.color;
        } else {
          res.color = 'rgba(255,255,255,0.04)';
          res.label = '';
          res.size = data.size * 0.4;
        }
      }

      return res;
    },

    edgeReducer: (edge, data) => {
      const [src, tgt] = graph.extremities(edge);
      const srcColor = graph.getNodeAttribute(src, 'color') || 'rgb(128,128,128)';
      const rgb = srcColor.match(/\d+/g);

      // Estado padrão — levinho
      const res = {
        ...data,
        color: `rgba(${rgb[0]},${rgb[1]},${rgb[2]},0.12)`,
        size: 0.3
      };

      // Hover — destaca arestas do nó
      if (hoveredNode !== null) {
        if (src === hoveredNode || tgt === hoveredNode) {
          res.color = `rgba(${rgb[0]},${rgb[1]},${rgb[2]},0.8)`;
          res.size = 1.5;
        } else {
          res.color = `rgba(${rgb[0]},${rgb[1]},${rgb[2]},0.02)`;
          res.size = 0.2;
        }
        return res;
      }

      // Cluster destacado
      if (highlightedCluster !== null) {
        const srcCls = graph.getNodeAttribute(src, 'modClass');
        const tgtCls = graph.getNodeAttribute(tgt, 'modClass');
        if (srcCls === highlightedCluster && tgtCls === highlightedCluster) {
          res.color = `rgba(${rgb[0]},${rgb[1]},${rgb[2]},0.4)`;
          res.size = 0.7;
        } else {
          res.color = `rgba(${rgb[0]},${rgb[1]},${rgb[2]},0.01)`;
          res.size = 0.1;
        }
      }

      return res;
    }
  });

  // Esconde canvas de hover padrão
  setTimeout(() => {
    const canvases = container.querySelectorAll('canvas');
    canvases.forEach(c => {
      if (c.className && c.className.includes('hover')) {
        c.style.display = 'none';
      }
    });
    // Também tenta via classe sigma-hovers
    const hoversDiv = container.querySelector('.sigma-hovers');
    if (hoversDiv) hoversDiv.style.display = 'none';
  }, 200);

  // Eventos de hover
  renderer.on('enterNode', ({ node }) => {
    hoveredNode = node;
    renderer.refresh();
    showTooltip(node);
    drawHulls();
  });

  renderer.on('leaveNode', () => {
    hoveredNode = null;
    renderer.refresh();
    hideTooltip();
    drawHulls();
  });

  // Evento de clique
  renderer.on('clickNode', ({ node }) => {
    showNodePanel(node);
  });

  // Clique no fundo — fecha painel e reseta
  renderer.on('clickStage', () => {
    closeNodePanel();
    if (highlightedCluster !== null) {
      toggleClusterHighlight(highlightedCluster);
    }
  });

  // Câmera
  cameraState = renderer.getCamera().getState();
  renderer.getCamera().on('updated', () => drawHulls());

  // Desenha hulls inicialmente e ao redimensionar
  drawHulls();
  window.addEventListener('resize', () => {
    drawHulls();
    drawBadges();
  });

  // Inicializa busca
  initSearch();
}

// ── Hulls de cluster ──────────────────────────────────────────────
function drawHulls() {
  const canvas = document.getElementById('hull-canvas');
  const W = canvas.width = canvas.offsetWidth;
  const H = canvas.height = canvas.offsetHeight;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, W, H);

  if (!renderer) return;

  const clusters = {};
  graph.nodes().forEach(node => {
    const cls = graph.getNodeAttribute(node, 'modClass');
    if (!clusters[cls]) clusters[cls] = [];
    const pos = renderer.graphToViewport({ x: graph.getNodeAttribute(node, 'x'), y: graph.getNodeAttribute(node, 'y') });
    clusters[cls].push([pos.x, pos.y]);
  });

  Object.entries(clusters).forEach(([cls, points]) => {
    if (points.length < 3) return;
    const hull = convexHull(points);
    if (!hull || hull.length < 3) return;

    // Expande o hull
    const cx = hull.reduce((s, p) => s + p[0], 0) / hull.length;
    const cy = hull.reduce((s, p) => s + p[1], 0) / hull.length;
    const expanded = hull.map(([px, py]) => {
      const dx = px - cx, dy = py - cy;
      const len = Math.hypot(dx, dy) || 1;
      return [px + dx / len * 18, py + dy / len * 18];
    });

    const color = colorMap[cls] || '#888';
    const rgb = color.match(/\d+/g);

    // Transparência reduzida se cluster não destacado
    const alpha = highlightedCluster !== null && highlightedCluster !== cls ? 0.02 : 0.07;
    const strokeAlpha = highlightedCluster !== null && highlightedCluster !== cls ? 0.05 : 0.25;

    ctx.beginPath();
    catmullRomPath(ctx, expanded, true);
    ctx.fillStyle = `rgba(${rgb[0]},${rgb[1]},${rgb[2]},${alpha})`;
    ctx.fill();
    ctx.strokeStyle = `rgba(${rgb[0]},${rgb[1]},${rgb[2]},${strokeAlpha})`;
    ctx.lineWidth = 1.5;
    ctx.stroke();
  });

  drawBadges();
}

// ── Badges de cluster ─────────────────────────────────────────────
function drawBadges() {
  const canvas = document.getElementById('badge-canvas');
  const W = canvas.width = canvas.offsetWidth;
  const H = canvas.height = canvas.offsetHeight;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, W, H);

  if (!renderer) return;

  const clusters = {};
  graph.nodes().forEach(node => {
    const cls = graph.getNodeAttribute(node, 'modClass');
    if (!clusters[cls]) clusters[cls] = [];
    const pos = renderer.graphToViewport({ x: graph.getNodeAttribute(node, 'x'), y: graph.getNodeAttribute(node, 'y') });
    clusters[cls].push(pos);
  });

  // Centróide global
  const allPos = graph.nodes().map(n => renderer.graphToViewport({ x: graph.getNodeAttribute(n, 'x'), y: graph.getNodeAttribute(n, 'y') }));
  const gcx = allPos.reduce((s, p) => s + p.x, 0) / allPos.length;
  const gcy = allPos.reduce((s, p) => s + p.y, 0) / allPos.length;

  Object.entries(clusters).forEach(([cls, pts]) => {
    if (pts.length < 2) return;
    const cx = pts.reduce((s, p) => s + p.x, 0) / pts.length;
    const cy = pts.reduce((s, p) => s + p.y, 0) / pts.length;

    // Empurra para fora do centróide global
    const dx = cx - gcx, dy = cy - gcy;
    const len = Math.hypot(dx, dy) || 1;
    const push = 55;
    const bx = cx + dx / len * push;
    const by = cy + dy / len * push;

    const name = clusterNames[cls] || `Cluster ${cls}`;
    const color = colorMap[cls] || '#888';
    const rgb = color.match(/\d+/g);
    const alpha = highlightedCluster !== null && highlightedCluster !== cls ? 0.2 : 0.9;

    ctx.font = 'bold 10px Inter, system-ui, sans-serif';
    const tw = ctx.measureText(name).width + 16;
    const th = 18;

    // Fundo do badge
    ctx.beginPath();
    roundRect(ctx, bx - tw / 2, by - th / 2, tw, th, 5);
    ctx.fillStyle = `rgba(${rgb[0]},${rgb[1]},${rgb[2]},${alpha})`;
    ctx.fill();

    // Texto
    ctx.fillStyle = `rgba(255,255,255,${alpha > 0.5 ? 1 : 0.4})`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(name, bx, by);
  });
}

// ── Tooltip ───────────────────────────────────────────────────────
function showTooltip(node) {
  const data = nodeDataMap[node];
  if (!data) return;
  const tt = document.getElementById('tooltip');
  const cls = data.modClass;
  const clsName = clusterNames[cls] || `Cluster ${cls}`;
  const color = colorMap[cls] || '#888';

  tt.innerHTML = `
    <strong>${data.label}</strong>
    <div class="tt-row"><span>Cluster</span><span class="tt-val" style="color:${color}">${clsName}</span></div>
    <div class="tt-row"><span>Co-citações</span><span class="tt-val">${data.citations}</span></div>
    <div class="tt-row"><span>Conexões</span><span class="tt-val">${data.degree}</span></div>
  `;
  tt.style.display = 'block';

  document.addEventListener('mousemove', posTooltip);
}

function posTooltip(e) {
  const tt = document.getElementById('tooltip');
  tt.style.left = (e.clientX + 14) + 'px';
  tt.style.top = (e.clientY - 10) + 'px';
}

function hideTooltip() {
  document.getElementById('tooltip').style.display = 'none';
  document.removeEventListener('mousemove', posTooltip);
}

// ── Painel de nó ──────────────────────────────────────────────────
function showNodePanel(node) {
  const data = nodeDataMap[node];
  if (!data) return;
  const cls = data.modClass;
  const clsName = clusterNames[cls] || `Cluster ${cls}`;
  const color = colorMap[cls] || '#888';

  document.getElementById('np-name').textContent = data.label;
  const clsEl = document.getElementById('np-cluster');
  clsEl.textContent = clsName;
  clsEl.style.background = color.replace('rgb', 'rgba').replace(')', ',0.25)');
  clsEl.style.color = color;
  document.getElementById('np-cit').textContent = data.citations;
  document.getElementById('np-deg').textContent = data.degree;
  document.getElementById('np-cls').textContent = cls;
  document.getElementById('node-panel').style.display = 'block';
}

function closeNodePanel() {
  document.getElementById('node-panel').style.display = 'none';
}

// ── Destaque por cluster ──────────────────────────────────────────
function toggleClusterHighlight(cls) {
  if (highlightedCluster === cls) {
    highlightedCluster = null;
    document.querySelectorAll('.legend-item').forEach(el => el.classList.remove('active'));
  } else {
    highlightedCluster = cls;
    document.querySelectorAll('.legend-item').forEach(el => {
      el.classList.toggle('active', el.dataset.cls === cls);
    });
  }
  renderer.refresh();
  drawHulls();
}

// ── Busca / autocomplete ──────────────────────────────────────────
function initSearch() {
  const input = document.getElementById('search');
  const sugg = document.getElementById('suggestions');

  input.addEventListener('input', () => {
    const q = input.value.toLowerCase().trim();
    sugg.innerHTML = '';
    if (q.length < 2) { sugg.style.display = 'none'; return; }

    const matches = graph.nodes()
      .filter(n => graph.getNodeAttribute(n, 'label').toLowerCase().includes(q))
      .slice(0, 8);

    if (!matches.length) { sugg.style.display = 'none'; return; }

    matches.forEach(node => {
      const label = graph.getNodeAttribute(node, 'label');
      const div = document.createElement('div');
      div.className = 'suggestion';
      div.textContent = label;
      div.addEventListener('click', () => focusNode(node));
      sugg.appendChild(div);
    });

    sugg.style.display = 'block';
  });

  document.addEventListener('click', e => {
    if (!e.target.closest('#search-wrap')) {
      sugg.style.display = 'none';
    }
  });
}

function focusNode(node) {
  const x = graph.getNodeAttribute(node, 'x');
  const y = graph.getNodeAttribute(node, 'y');
  renderer.getCamera().animate({ x, y, ratio: 0.15 }, { duration: 600 });
  hoveredNode = node;
  renderer.refresh();
  showNodePanel(node);
  document.getElementById('suggestions').style.display = 'none';
  document.getElementById('search').value = graph.getNodeAttribute(node, 'label');
}

// ── Utilitários ───────────────────────────────────────────────────
function resetView() {
  hoveredNode = null;
  highlightedCluster = null;
  document.querySelectorAll('.legend-item').forEach(el => el.classList.remove('active'));
  renderer.getCamera().animate({ x: 0.5, y: 0.5, ratio: 1, angle: 0 }, { duration: 500 });
  renderer.refresh();
  drawHulls();
  document.getElementById('search').value = '';
}

function togglePanel() {
  const panel = document.getElementById('panel');
  const toggle = document.getElementById('panel-toggle');
  panel.classList.toggle('collapsed');
  toggle.textContent = panel.classList.contains('collapsed') ? '▼' : '▲';
}

function exportPNG() {
  const layers = ['edges', 'nodes', 'labels'];
  const merged = document.createElement('canvas');
  merged.width = window.innerWidth;
  merged.height = window.innerHeight;
  const ctx = merged.getContext('2d');
  ctx.fillStyle = '#0d0d1a';
  ctx.fillRect(0, 0, merged.width, merged.height);

  // Hull canvas
  ctx.drawImage(document.getElementById('hull-canvas'), 0, 0);

  // Sigma layers
  layers.forEach(id => {
    const c = document.getElementById('sigma-container').querySelector(`canvas[data-layer="${id}"]`);
    if (c) ctx.drawImage(c, 0, 0);
  });

  // Badge canvas
  ctx.drawImage(document.getElementById('badge-canvas'), 0, 0);

  const a = document.createElement('a');
  a.download = 'rede-cocitacao.png';
  a.href = merged.toDataURL('image/png');
  a.click();
}

// ── Convex Hull (Graham scan) ─────────────────────────────────────
function convexHull(pts) {
  if (pts.length < 3) return pts;
  const sorted = [...pts].sort((a, b) => a[0] - b[0] || a[1] - b[1]);
  const cross = (O, A, B) => (A[0]-O[0])*(B[1]-O[1]) - (A[1]-O[1])*(B[0]-O[0]);
  const lower = [], upper = [];
  for (const p of sorted) {
    while (lower.length >= 2 && cross(lower[lower.length-2], lower[lower.length-1], p) <= 0) lower.pop();
    lower.push(p);
  }
  for (const p of sorted.reverse()) {
    while (upper.length >= 2 && cross(upper[upper.length-2], upper[upper.length-1], p) <= 0) upper.pop();
    upper.push(p);
  }
  upper.pop(); lower.pop();
  return lower.concat(upper);
}

// ── Catmull-Rom path (curva suave) ────────────────────────────────
function catmullRomPath(ctx, pts, closed) {
  if (pts.length < 2) return;
  const alpha = 0.5;
  const getT = (t, p0, p1) => Math.pow(Math.hypot(p1[0]-p0[0], p1[1]-p0[1]), alpha) + t;
  const all = closed ? [...pts, pts[0], pts[1]] : pts;
  const draw = closed ? pts : pts.slice(1, -1);

  ctx.moveTo(pts[0][0], pts[0][1]);
  for (let i = 0; i < draw.length; i++) {
    const p0 = all[i], p1 = all[i+1], p2 = all[i+2] || all[i+1], p3 = all[i+3] || p2;
    const t0 = 0, t1 = getT(t0,p0,p1), t2 = getT(t1,p1,p2), t3 = getT(t2,p2,p3);
    for (let t = t1; t < t2; t += (t2-t1)/20) {
      const A1 = [lerp(p0[0],p1[0],(t-t0)/(t1-t0)||0), lerp(p0[1],p1[1],(t-t0)/(t1-t0)||0)];
      const A2 = [lerp(p1[0],p2[0],(t-t1)/(t2-t1)), lerp(p1[1],p2[1],(t-t1)/(t2-t1))];
      const A3 = [lerp(p2[0],p3[0],(t-t2)/(t3-t2)||0), lerp(p2[1],p3[1],(t-t2)/(t3-t2)||0)];
      const B1 = [lerp(A1[0],A2[0],(t-t1)/(t2-t1)), lerp(A1[1],A2[1],(t-t1)/(t2-t1))];
      const B2 = [lerp(A2[0],A3[0],(t-t1)/(t2-t1)), lerp(A2[1],A3[1],(t-t1)/(t2-t1))];
      ctx.lineTo(lerp(B1[0],B2[0],(t-t1)/(t2-t1)), lerp(B1[1],B2[1],(t-t1)/(t2-t1)));
    }
  }
  if (closed) ctx.closePath();
}

function lerp(a, b, t) { return a + (b - a) * t; }

// ── Rect arredondado (canvas) ─────────────────────────────────────
function roundRect(ctx, x, y, w, h, r) {
  ctx.moveTo(x + r, y);
  ctx.arcTo(x+w, y, x+w, y+h, r);
  ctx.arcTo(x+w, y+h, x, y+h, r);
  ctx.arcTo(x, y+h, x, y, r);
  ctx.arcTo(x, y, x+w, y, r);
  ctx.closePath();
}
